version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_agent_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  employee-ai-agent:
    build: .
    container_name: employee-ai-agent
    restart: always

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "2026:2026"

    environment:
      DB_URL: jdbc:mysql://mysql:3306/ai_agent_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root

volumes:
  mysql_data: